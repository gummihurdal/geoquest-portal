/* ── DESIGN TOKENS ── */

  --blue-600: #2563eb;
  --blue-400: #60a5fa;

  background: rgba(245,158,11,0.12) !important;
  border: 1px solid rgba(245,158,11,0.25) !important;
  color: var(--amber-400) !important;
  border-radius: 8px !important;
}
button[class*="Hint"]:hover { background: rgba(245,158,11,0.2) !important; }

/* Guess button */
button[class*="from-teal"][class*="text-night"],
.guess-input ~ * button,
button[class*="absolute"][class*="right"] {
  background: linear-gradient(135deg, #0d9488, #14b8a6) !important;
  color: white !important;
  font-weight: 700 !important;
  border-radius: 8px !important;
}

/* ═══════════════════════════════════════
   INPUTS
═══════════════════════════════════════ */
input[type="text"], input[type="email"],
input[type="password"], input[type="search"],
textarea {
  background: var(--bg-elevated) !important;
  border: 1px solid var(--border-default) !important;
  color: var(--text-primary) !important;
  border-radius: 10px !important;
  font-family: 'Inter', sans-serif !important;
  font-size: 14px !important;
  transition: border-color 0.15s, box-shadow 0.15s !important;
}
input:focus, textarea:focus {
  border-color: var(--blue-500) !important;
  outline: none !important;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.12) !important;
}
input::placeholder { color: var(--text-tertiary) !important; }

/* Guess input specific */
.guess-input {
  background: var(--bg-elevated) !important;
  border: 1px solid rgba(20,184,166,0.25) !important;
  border-radius: 12px !important;
  font-size: 15px !important;
  font-weight: 500 !important;
  padding: 14px 18px !important;
}
.guess-input:focus {
  border-color: var(--teal-500) !important;
  box-shadow: 0 0 0 3px var(--teal-glow) !important;
}

/* ═══════════════════════════════════════
   AUTOCOMPLETE DROPDOWN
═══════════════════════════════════════ */
[class*="absolute"][class*="top-full"],
[class*="z-30"][class*="rounded"],
[role="listbox"] {
  background: var(--bg-elevated) !important;
  border: 1px solid var(--border-default) !important;
  border-radius: 12px !important;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5) !important;
  overflow: hidden !important;
}
[class*="absolute"][class*="top-full"] button {
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  padding: 11px 16px !important;
  font-size: 14px !important;
  color: var(--text-primary) !important;
  border-bottom: 1px solid var(--border-subtle) !important;
  border-radius: 0 !important;
  font-weight: 500 !important;
}
[class*="absolute"][class*="top-full"] button:hover {
  background: rgba(59,130,246,0.08) !important;
  color: var(--blue-400) !important;
  transform: none !important;
  box-shadow: none !important;
}

/* ═══════════════════════════════════════
   CLUE CARDS (Guess Country game)
═══════════════════════════════════════ */
[class*="clue"], [class*="Clue"],
div[class*="flex"][class*="items-center"][class*="justify-between"][class*="p-"][class*="rounded"] {
  background: var(--bg-surface) !important;
  border: 1px solid var(--border-subtle) !important;
  border-radius: 12px !important;
}
/* Clue labels */
[class*="REGION"], [class*="AREA"], [class*="POPULATION"],
p[class*="text-xs"][class*="uppercase"] {
  color: var(--text-tertiary) !important;
  letter-spacing: 1.5px !important;
  font-size: 10px !important;
  font-weight: 700 !important;
}
/* Clue values */
[class*="clue"] [class*="font-bold"],
[class*="clue"] [class*="text-lg"],
div[class*="p-"][class*="rounded"] p[class*="font-bold"] {
  color: var(--text-primary) !important;
  font-size: 17px !important;
  font-weight: 700 !important;
}
/* Starter badge */
span[class*="starter"], [class*="badge-starter"] {
  background: rgba(59,130,246,0.1) !important;
  color: var(--blue-400) !important;
  border: 1px solid rgba(59,130,246,0.2) !important;
  border-radius: 6px !important;
  font-size: 10.5px !important;
  font-weight: 600 !important;
  padding: 3px 9px !important;
}

/* ═══════════════════════════════════════
   LEADERBOARD / RANKINGS
═══════════════════════════════════════ */
table { border-collapse: collapse !important; width: 100% !important; }
thead th {
  background: var(--bg-overlay) !important;
  color: var(--text-tertiary) !important;
  font-size: 10.5px !important;
  font-weight: 700 !important;
  letter-spacing: 2px !important;
  text-transform: uppercase !important;
  padding: 12px 16px !important;
  border-bottom: 1px solid var(--border-subtle) !important;
}
tbody tr { border-bottom: 1px solid var(--border-subtle) !important; }
tbody tr:hover td { background: rgba(59,130,246,0.04) !important; }
tbody td { padding: 12px 16px !important; font-size: 14px !important; }

/* ═══════════════════════════════════════
   PROFILE / AVATAR
═══════════════════════════════════════ */
[class*="avatar"], [class*="Avatar"] {
  border: 2px solid rgba(59,130,246,0.3) !important;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.08) !important;
}

/* Top-right user widget */
[class*="trigger"][class*="rounded"],
button[class*="rounded-full"][class*="border"] {
  background: var(--bg-surface) !important;
  border: 1px solid var(--border-default) !important;
  border-radius: 10px !important;
}

/* ═══════════════════════════════════════
   BADGES & TAGS
═══════════════════════════════════════ */
[class*="badge"], [class*="Badge"],
span[class*="rounded-full"][class*="text-xs"],
span[class*="px-"][class*="py-"][class*="rounded"] {
  font-size: 10.5px !important;
  font-weight: 700 !important;
  letter-spacing: 0.5px !important;
  border-radius: 100px !important;
  padding: 3px 10px !important;
}

/* Score display */
[class*="score"], [class*="Score"] {
  font-family: 'Plus Jakarta Sans', sans-serif !important;
  font-weight: 800 !important;
  letter-spacing: -0.5px !important;
}

/* ═══════════════════════════════════════
   MYSTERY COUNTRY HEADER
═══════════════════════════════════════ */
div:has(> [class*="MYSTERY"]),
[class*="mystery"], [class*="Mystery"] {
  background: var(--bg-elevated) !important;
  border-radius: 12px !important;
  padding: 16px 20px !important;
  border: 1px solid var(--border-subtle) !important;
}

/* ═══════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════ */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 100px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

/* ═══════════════════════════════════════
   PROGRESS & LOADING
═══════════════════════════════════════ */
[role="progressbar"] > div,
[class*="progress"] > div {
  background: linear-gradient(90deg, var(--blue-600), var(--blue-400)) !important;
  border-radius: 100px !important;
}

/* ═══════════════════════════════════════
   MOBILE RESPONSIVE
═══════════════════════════════════════ */
@media (max-width: 768px) {
  [data-sidebar="sidebar"] {
    background: var(--bg-base) !important;
  }
}

/* ═══════════════════════════════════════
   MISC UTILITIES
═══════════════════════════════════════ */
[class*="separator"], hr {
  border-color: var(--border-subtle) !important;
  background: var(--border-subtle) !important;
}
[class*="shadow"] { box-shadow: 0 4px 24px rgba(0,0,0,0.35) !important; }
[class*="ring"] { ring-color: var(--blue-500) !important; }
</style>
<!-- END DESIGN SYSTEM v2 -->
</head>
  <body>
    <!-- ── AUTH OVERLAY ── -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <div id="gq-auth-overlay" class="gq-hidden">
      <div id="gq-auth-card">
        <div class="gq-auth-globe">🌍</div>
        <h2>Welcome to GeoQuest</h2>
        <p>Sign in to track your scores, climb the leaderboard, and unlock the full world of geography challenges.</p>
        <div class="gq-auth-features">
          <div class="gq-auth-feat"><span>🏆</span> Leaderboard</div>
          <div class="gq-auth-feat"><span>📊</span> Stats</div>
          <div class="gq-auth-feat"><span>📱</span> Any device</div>
        </div>

        <!-- Google OAuth -->
        <button class="gq-auth-btn-google" onclick="gqHandleGoogleAuth()">
          <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </button>

        <div class="gq-auth-divider"></div>

        <!-- Sign in / Sign up tabs -->
        <div class="gq-auth-tabs">
          <button class="gq-auth-tab active" id="gq-tab-signin" onclick="gqSwitchTab('signin')">Sign in</button>
          <button class="gq-auth-tab" id="gq-tab-signup" onclick="gqSwitchTab('signup')">Create account</button>
        </div>

        <!-- Sign in panel -->
        <div class="gq-auth-panel active" id="gq-panel-signin">
          <input type="email" class="gq-auth-input" id="gq-email" placeholder="Email" autocomplete="email">
          <input type="password" class="gq-auth-input" id="gq-password" placeholder="Password" autocomplete="current-password">
          <div style="text-align:right; margin-bottom:10px;">
            <button class="gq-auth-btn-link" onclick="gqSwitchTab('forgot')">Forgot password?</button>
          </div>
          <button class="gq-auth-btn-primary" id="gq-submit-signin" onclick="gqHandleSignIn()">Sign in</button>
        </div>

        <!-- Sign up panel -->
        <div class="gq-auth-panel" id="gq-panel-signup">
          <input type="email" class="gq-auth-input" id="gq-email-signup" placeholder="Email" autocomplete="email">
          <input type="password" class="gq-auth-input" id="gq-password-signup" placeholder="Password (min 6 chars)" autocomplete="new-password">
          <button class="gq-auth-btn-primary" id="gq-submit-signup" onclick="gqHandleSignUp()">Create account</button>
        </div>

        <!-- Forgot password panel -->
        <div class="gq-auth-panel" id="gq-panel-forgot">
          <p style="font-size:13px;color:var(--gq-muted);margin-bottom:12px;">Enter your email and we'll send a reset link.</p>
          <input type="email" class="gq-auth-input" id="gq-email-forgot" placeholder="Email">
          <button class="gq-auth-btn-primary" onclick="gqHandleForgotPassword()">Send reset link</button>
          <div style="margin-top:10px;text-align:center;">
            <button class="gq-auth-btn-link" onclick="gqSwitchTab('signin')">← Back to sign in</button>
          </div>
        </div>

        <div id="gq-auth-msg" class="gq-auth-msg"></div>
        <hr class="gq-auth-divider">
        <button id="gq-browse-btn" onclick="gqDismissOverlay()" style="background:none;border:1px solid var(--gq-border);border-radius:8px;padding:8px 14px;color:var(--gq-muted);font-size:12px;font-family:var(--gq-font-ui);cursor:pointer;">
          Continue without account
        </button>
      </div>
    </div>

    <script>
    (function(){
      var SB_URL = 'https://mjphpctvuxmbjhmcscoj.supabase.co';
      var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qcGhwY3R2dXhtYmpobWNzY29qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMjgzMzQsImV4cCI6MjA4NzgwNDMzNH0.dsmzK7SS4_RSC5wbN6ifhjRlOSbfDZjIcfh2MKkDQIs';
      var gqSb = supabase.createClient(SB_URL, SB_KEY);

      function gqSetMsg(msg, isErr){
        var el = document.getElementById('gq-auth-msg');
        el.textContent = msg;
        el.className = 'gq-auth-msg' + (isErr ? ' gq-auth-msg-err' : '');
      }

      window.gqSwitchTab = function(tab){
        ['signin','signup','forgot'].forEach(function(t){
          document.getElementById('gq-panel-'+t).classList.toggle('active', t===tab);
          var btn = document.getElementById('gq-tab-'+t);
          if(btn) btn.classList.toggle('active', t===tab);
        });
        gqSetMsg('');
      };

      window.gqHandleGoogleAuth = function(){
        window.location.href = SB_URL + '/auth/v1/authorize?provider=google&redirect_to=' + encodeURIComponent(window.location.href);
      };

      window.gqHandleSignIn = async function(){
        var email = document.getElementById('gq-email').value.trim();
        var password = document.getElementById('gq-password').value;
        if(!email||!password){ gqSetMsg('Enter email and password', true); return; }
        var btn = document.getElementById('gq-submit-signin');
        btn.disabled=true; btn.textContent='Signing in…';
        var result = await gqSb.auth.signInWithPassword({email: email, password: password});
        if(result.error){ gqSetMsg(result.error.message, true); btn.disabled=false; btn.textContent='Sign in'; }
      };

      window.gqHandleSignUp = async function(){
        var email = document.getElementById('gq-email-signup').value.trim();
        var password = document.getElementById('gq-password-signup').value;
        if(!email||!password){ gqSetMsg('Enter email and password', true); return; }
        if(password.length<6){ gqSetMsg('Password must be at least 6 characters', true); return; }
        var btn = document.getElementById('gq-submit-signup');
        btn.disabled=true; btn.textContent='Creating…';
        var result = await gqSb.auth.signUp({email: email, password: password});
        if(result.error){ gqSetMsg(result.error.message, true); btn.disabled=false; btn.textContent='Create account'; }
        else { gqSetMsg('✅ Account created! Check your email to confirm.', false); btn.textContent='Create account'; btn.disabled=false; }
      };

      window.gqHandleForgotPassword = async function(){
        var email = document.getElementById('gq-email-forgot').value.trim();
        if(!email){ gqSetMsg('Enter your email', true); return; }
        var result = await gqSb.auth.resetPasswordForEmail(email, {redirectTo: window.location.href});
        if(result.error){ gqSetMsg(result.error.message, true); }
        else { gqSetMsg('✉️ Reset link sent — check your email', false); }
      };

      window.gqDismissOverlay = function(){
        document.getElementById('gq-auth-overlay').classList.add('gq-hidden');
      };

      // Hide overlay when authenticated
      gqSb.auth.onAuthStateChange(function(event, session){
        if(event === 'SIGNED_IN' && session){
          document.getElementById('gq-auth-overlay').classList.add('gq-hidden');
        }
      });

      // Check session on load
      gqSb.auth.getSession().then(function(result){
        if(result.data && result.data.session){
          document.getElementById('gq-auth-overlay').classList.add('gq-hidden');
        }
      });
    })();
    </script>

    <div id="root"></div>
  <script>
(function(){
  var SB='https://mjphpctvuxmbjhmcscoj.supabase.co';
  var K='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qcGhwY3R2dXhtYmpobWNzY29qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMjgzMzQsImV4cCI6MjA4NzgwNDMzNH0.dsmzK7SS4_RSC5wbN6ifhjRlOSbfDZjIcfh2MKkDQIs';
  fetch('https://ipapi.co/json/')
    .then(function(r){return r.json();})
    .then(function(g){
      fetch(SB+'/rest/v1/page_visitors',{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':K,'Authorization':'Bearer '+K,'Prefer':'return=minimal'},
        body:JSON.stringify({

          ip:g.ip,
          country:g.country_name,
          country_code:g.country_code,
          city:g.city,

          org:g.org,
          referrer:document.referrer||null,
          user_agent:navigator.userAgent
        })
      }).catch(function(){});
    }).catch(function(){});
})();
</script>
